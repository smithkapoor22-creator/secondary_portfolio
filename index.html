<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEURAL ORBIT | Cursor‑Responsive Brain</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', monospace;
      background-color: black;
    }
    #info {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      pointer-events: none;
      z-index: 100;
      color: #ff8844;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      width: fit-content;
      margin: 0 auto;
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 0.75rem;
      letter-spacing: 1px;
      border: 1px solid #ff6600;
      font-family: monospace;
      left: 50%;
      transform: translateX(-50%);
    }
    .badge {
      position: fixed;
      top: 18px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.65rem;
      color: #ffaa66;
      font-family: monospace;
      pointer-events: none;
      z-index: 100;
      border: 0.5px solid #ff6600;
    }
    @media (max-width: 700px) {
      .badge { display: none; }
      #info { font-size: 0.65rem; padding: 4px 12px; }
    }
  </style>
</head>
<body>
  <div id="info">✦ ENERGY CORE ✦ | SCALED BRAIN + GEOMETRIC PARTICLES</div>
  <div class="badge">⚡ MOVE MOUSE • ORANGE CRYSTALS • DYNAMIC RINGS</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- setup scene (pure black) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x000000, 0.003);

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(4.5, 3, 7);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.toneMappingExposure = 1.25;
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- bloom (orange glow, balanced) ---
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.35, 0.65);
    bloomPass.threshold = 0.1;
    bloomPass.strength = 0.78;
    bloomPass.radius = 0.6;
    const effectComposer = new EffectComposer(renderer);
    effectComposer.addPass(renderScene);
    effectComposer.addPass(bloomPass);

    // --- controls with auto-rotate ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.55;
    controls.enableZoom = true;
    controls.zoomSpeed = 1.0;
    controls.target.set(0, 0, 0);

    // --- lighting (orange/black theme, dynamic) ---
    const ambient = new THREE.AmbientLight(0x111111, 0.55);
    scene.add(ambient);
    const keyLight = new THREE.DirectionalLight(0xff8844, 1.0);
    keyLight.position.set(4, 5, 3);
    keyLight.castShadow = true;
    scene.add(keyLight);
    const fillLight = new THREE.PointLight(0xff5522, 0.65);
    fillLight.position.set(-2, 2.5, 4);
    scene.add(fillLight);
    const rimLight = new THREE.PointLight(0xffaa66, 0.9);
    rimLight.position.set(1.8, 1.5, -4.2);
    scene.add(rimLight);
    const backFill = new THREE.PointLight(0xff6622, 0.55);
    backFill.position.set(-1.2, 1, -4);
    scene.add(backFill);
    const corePulse = new THREE.PointLight(0xff4400, 1.1, 15);
    corePulse.position.set(0, 0, 0);
    scene.add(corePulse);

    // ========== BRAIN MODEL LOADING (with scaling to fix "too big") ==========
    let brainModel = null;
    let brainBounds = { min: new THREE.Vector3(-0.6, -0.5, -0.6), max: new THREE.Vector3(0.6, 0.5, 0.6) }; // adjusted after scale
    const loader = new GLTFLoader();
    loader.load('https://smithkapoor22-creator.github.io/secondary_portfolio/brain.glb',
      (gltf) => {
        brainModel = gltf.scene;
        // Scale down the brain (original too large)
        brainModel.scale.set(0.45, 0.45, 0.45);
        brainModel.position.y = -0.1; // center it
        brainModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            if (child.material) {
              child.material.emissive = new THREE.Color(0x331100);
              child.material.emissiveIntensity = 0.12;
              child.material.metalness = 0.3;
              child.material.roughness = 0.5;
            }
          }
        });
        scene.add(brainModel);
        
        // Update bounds based on scaled model
        const box = new THREE.Box3().setFromObject(brainModel);
        brainBounds.min = box.min.clone();
        brainBounds.max = box.max.clone();
        controls.target.set(0, (brainBounds.min.y + brainBounds.max.y)/2, 0);
        console.log('Brain loaded and scaled to 45%');
        generateNeurons();
        generateActiveNeurons();
        generateSynapticLines();
      },
      undefined,
      (err) => {
        console.warn('Brain model failed, using fallback', err);
        const fallback = new THREE.Mesh(new THREE.SphereGeometry(0.65, 64, 64), new THREE.MeshStandardMaterial({ color: 0x222222, emissive: 0x331100 }));
        fallback.scale.set(0.8, 0.9, 0.7);
        scene.add(fallback);
        brainBounds = { min: new THREE.Vector3(-0.7, -0.6, -0.6), max: new THREE.Vector3(0.7, 0.6, 0.6) };
        generateNeurons();
        generateActiveNeurons();
        generateSynapticLines();
      }
    );

    // ========== NEURON SYSTEMS (inside brain) ==========
    let neuronPoints = null;
    let neuronPositionsAttr = null;
    let neuronVelocities = [];
    let activeNeuronsList = [];
    let synapticLines = [];
    let connections = [];
    const NEURON_COUNT = 5200;
    const ACTIVE_COUNT = 240;
    const SYNAPSE_COUNT = 2000;

    function generateNeurons() {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(NEURON_COUNT * 3);
      neuronVelocities = [];
      for (let i = 0; i < NEURON_COUNT; i++) {
        const x = brainBounds.min.x + Math.random() * (brainBounds.max.x - brainBounds.min.x);
        const y = brainBounds.min.y + Math.random() * (brainBounds.max.y - brainBounds.min.y);
        const z = brainBounds.min.z + Math.random() * (brainBounds.max.z - brainBounds.min.z);
        positions[i*3] = x;
        positions[i*3+1] = y;
        positions[i*3+2] = z;
        neuronVelocities.push({
          x: (Math.random() - 0.5) * 0.0055,
          y: (Math.random() - 0.5) * 0.0055,
          z: (Math.random() - 0.5) * 0.0055
        });
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const material = new THREE.PointsMaterial({ color: 0xff8833, size: 0.038, blending: THREE.AdditiveBlending });
      neuronPoints = new THREE.Points(geometry, material);
      scene.add(neuronPoints);
      neuronPositionsAttr = geometry.attributes.position.array;
    }

    function generateActiveNeurons() {
      for (let i = 0; i < ACTIVE_COUNT; i++) {
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.065, 20, 20), new THREE.MeshStandardMaterial({ color: 0xff7733, emissive: 0xff4400, emissiveIntensity: 0.7 }));
        const x = brainBounds.min.x + Math.random() * (brainBounds.max.x - brainBounds.min.x);
        const y = brainBounds.min.y + Math.random() * (brainBounds.max.y - brainBounds.min.y);
        const z = brainBounds.min.z + Math.random() * (brainBounds.max.z - brainBounds.min.z);
        sphere.position.set(x, y, z);
        sphere.userData = { vel: { x: (Math.random() - 0.5)*0.0035, y: (Math.random() - 0.5)*0.0035, z: (Math.random() - 0.5)*0.0035 } };
        scene.add(sphere);
        activeNeuronsList.push(sphere);
      }
    }

    function generateSynapticLines() {
      if (!neuronPoints) return;
      const lineMat = new THREE.LineBasicMaterial({ color: 0xff8844, transparent: true, opacity: 0.28 });
      for (let i = 0; i < SYNAPSE_COUNT; i++) {
        const idx1 = Math.floor(Math.random() * NEURON_COUNT);
        let idx2 = Math.floor(Math.random() * NEURON_COUNT);
        while (idx2 === idx1) idx2 = Math.floor(Math.random() * NEURON_COUNT);
        connections.push([idx1, idx2]);
        const geom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const line = new THREE.Line(geom, lineMat);
        scene.add(line);
        synapticLines.push(line);
      }
    }

    // ========== ATTRACTIVE SURROUNDING ANIMATIONS (geometric particles, no bubbles) ==========
    // 1. Sharp energy crystals (icosahedrons) orbiting
    const crystalCount = 120;
    const crystals = [];
    const crystalGeo = new THREE.IcosahedronGeometry(0.08, 0);
    for (let i = 0; i < crystalCount; i++) {
      const mat = new THREE.MeshStandardMaterial({ color: 0xff7733, emissive: 0xff4411, emissiveIntensity: 0.5 });
      const crystal = new THREE.Mesh(crystalGeo, mat);
      const radius = 1.5 + Math.random() * 1.2;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      crystal.userData = {
        radius, theta, phi,
        speedTheta: 0.005 + Math.random() * 0.008,
        speedPhi: 0.003 + Math.random() * 0.006
      };
      crystal.position.set(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.sin(phi) * Math.sin(theta) * 0.8,
        radius * Math.cos(phi)
      );
      scene.add(crystal);
      crystals.push(crystal);
    }
    
    // 2. Energy ribbons (thin torus knots with high glow)
    const ribbonMat = new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff5522, emissiveIntensity: 0.65 });
    const ribbon1 = new THREE.Mesh(new THREE.TorusKnotGeometry(1.55, 0.035, 200, 32, 2, 3), ribbonMat);
    scene.add(ribbon1);
    const ribbon2 = new THREE.Mesh(new THREE.TorusKnotGeometry(1.85, 0.03, 200, 32, 3, 4), ribbonMat);
    ribbon2.material = ribbonMat.clone();
    ribbon2.material.emissiveIntensity = 0.5;
    scene.add(ribbon2);
    
    // 3. Cursor‑responsive geometric particle field (sharp points, not bubbles)
    const sharpParticleCount = 2200;
    const sharpGeo = new THREE.BufferGeometry();
    const sharpPositions = [];
    for (let i = 0; i < sharpParticleCount; i++) {
      const rad = 1.8 + Math.random() * 1.5;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      sharpPositions.push(rad * Math.sin(phi) * Math.cos(theta), rad * Math.sin(phi) * Math.sin(theta) * 0.8, rad * Math.cos(phi));
    }
    sharpGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(sharpPositions), 3));
    const sharpMat = new THREE.PointsMaterial({ color: 0xffaa55, size: 0.028, blending: THREE.AdditiveBlending });
    const sharpField = new THREE.Points(sharpGeo, sharpMat);
    scene.add(sharpField);
    const originalSharpPos = sharpPositions.slice();
    
    // 4. Dynamic rings (already present, enhanced)
    const ringGeo = new THREE.TorusGeometry(1.68, 0.045, 128, 400);
    const ringMat1 = new THREE.MeshStandardMaterial({ color: 0xff6622, emissive: 0xff4411, emissiveIntensity: 0.55 });
    const ringA = new THREE.Mesh(ringGeo, ringMat1);
    ringA.rotation.x = Math.PI / 2;
    scene.add(ringA);
    const ringMat2 = new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff5522, emissiveIntensity: 0.45 });
    const ringB = new THREE.Mesh(ringGeo, ringMat2);
    ringB.scale.set(1.32, 1.32, 1.32);
    ringB.rotation.z = Math.PI / 3;
    scene.add(ringB);
    const ringMat3 = new THREE.MeshStandardMaterial({ color: 0xff7733, emissive: 0xff3311, emissiveIntensity: 0.4 });
    const ringC = new THREE.Mesh(ringGeo, ringMat3);
    ringC.scale.set(0.95, 0.95, 0.95);
    ringC.rotation.x = Math.PI / 4;
    ringC.rotation.z = Math.PI / 2;
    scene.add(ringC);
    
    // mouse tracking
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = (e.clientY / window.innerHeight) * 2 - 1;
    });
    
    // starfield background
    const starCount = 2000;
    const starGeo = new THREE.BufferGeometry();
    const starPos = [];
    for (let i = 0; i < starCount; i++) {
      starPos.push((Math.random() - 0.5) * 220, (Math.random() - 0.5) * 110, (Math.random() - 0.5) * 90 - 45);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffaa77, size: 0.08, transparent: true, blending: THREE.AdditiveBlending });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);
    
    // subtle grid
    const grid = new THREE.GridHelper(18, 32, 0xff6633, 0x442200);
    grid.position.y = -1.4;
    grid.material.transparent = true;
    grid.material.opacity = 0.08;
    scene.add(grid);
    
    // ========== ANIMATION LOOP ==========
    let time = 0;
    
    function animate() {
      requestAnimationFrame(animate);
      time += 0.012;
      
      // --- internal neurons ---
      if (neuronPoints && neuronPositionsAttr) {
        const positions = neuronPositionsAttr;
        for (let i = 0; i < NEURON_COUNT; i++) {
          let x = positions[i*3];
          let y = positions[i*3+1];
          let z = positions[i*3+2];
          x += neuronVelocities[i].x;
          y += neuronVelocities[i].y;
          z += neuronVelocities[i].z;
          if (x < brainBounds.min.x || x > brainBounds.max.x) neuronVelocities[i].x *= -0.98;
          if (y < brainBounds.min.y || y > brainBounds.max.y) neuronVelocities[i].y *= -0.98;
          if (z < brainBounds.min.z || z > brainBounds.max.z) neuronVelocities[i].z *= -0.98;
          positions[i*3] = Math.max(brainBounds.min.x, Math.min(brainBounds.max.x, x));
          positions[i*3+1] = Math.max(brainBounds.min.y, Math.min(brainBounds.max.y, y));
          positions[i*3+2] = Math.max(brainBounds.min.z, Math.min(brainBounds.max.z, z));
        }
        neuronPoints.geometry.attributes.position.needsUpdate = true;
        
        for (let idx = 0; idx < synapticLines.length; idx++) {
          const [i1, i2] = connections[idx];
          const p1 = new THREE.Vector3(positions[i1*3], positions[i1*3+1], positions[i1*3+2]);
          const p2 = new THREE.Vector3(positions[i2*3], positions[i2*3+1], positions[i2*3+2]);
          if (p1.distanceTo(p2) < 0.6) {
            synapticLines[idx].visible = true;
            synapticLines[idx].geometry.dispose();
            synapticLines[idx].geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
            synapticLines[idx].material.opacity = 0.35;
          } else synapticLines[idx].visible = false;
        }
      }
      
      activeNeuronsList.forEach(neu => {
        let pos = neu.position;
        let vel = neu.userData.vel;
        pos.x += vel.x;
        pos.y += vel.y;
        pos.z += vel.z;
        if (pos.x < brainBounds.min.x || pos.x > brainBounds.max.x) vel.x *= -0.96;
        if (pos.y < brainBounds.min.y || pos.y > brainBounds.max.y) vel.y *= -0.96;
        if (pos.z < brainBounds.min.z || pos.z > brainBounds.max.z) vel.z *= -0.96;
        pos.x = Math.max(brainBounds.min.x, Math.min(brainBounds.max.x, pos.x));
        pos.y = Math.max(brainBounds.min.y, Math.min(brainBounds.max.y, pos.y));
        pos.z = Math.max(brainBounds.min.z, Math.min(brainBounds.max.z, pos.z));
        const scaleVal = 0.7 + Math.sin(time * 5 + pos.x * 8) * 0.4;
        neu.scale.set(scaleVal, scaleVal, scaleVal);
      });
      
      // --- crystals orbiting (attractive geometric shapes) ---
      crystals.forEach(crystal => {
        const data = crystal.userData;
        data.theta += data.speedTheta;
        data.phi += data.speedPhi;
        const x = data.radius * Math.sin(data.phi) * Math.cos(data.theta);
        const y = data.radius * Math.sin(data.phi) * Math.sin(data.theta) * 0.8;
        const z = data.radius * Math.cos(data.phi);
        crystal.position.set(x, y, z);
        crystal.rotation.x = time * 0.8;
        crystal.rotation.y = time * 0.5;
        const glow = 0.6 + Math.sin(time * 4 + data.radius) * 0.4;
        crystal.material.emissiveIntensity = glow;
      });
      
      // --- energy ribbons rotation ---
      ribbon1.rotation.x = time * 0.3;
      ribbon1.rotation.y = time * 0.25;
      ribbon2.rotation.x = time * 0.2;
      ribbon2.rotation.z = time * 0.35;
      
      // --- cursor‑responsive sharp particle field (no bubbles) ---
      const sharpAttr = sharpField.geometry.attributes.position.array;
      for (let i = 0; i < sharpParticleCount; i++) {
        const ix = i * 3;
        const origX = originalSharpPos[ix];
        const origY = originalSharpPos[ix+1];
        const origZ = originalSharpPos[ix+2];
        let tx = origX + mouse.x * 0.45;
        let ty = origY - mouse.y * 0.35;
        sharpAttr[ix] += (tx - sharpAttr[ix]) * 0.04;
        sharpAttr[ix+1] += (ty - sharpAttr[ix+1]) * 0.04;
        sharpAttr[ix+2] += (origZ - sharpAttr[ix+2]) * 0.02;
      }
      sharpField.geometry.attributes.position.needsUpdate = true;
      
      // --- dynamic rings with mouse tilt ---
      ringA.rotation.z = time * 0.32;
      ringA.rotation.x = Math.PI / 2 + mouse.y * 0.3;
      ringB.rotation.y = time * 0.28 + mouse.x * 0.5;
      ringB.rotation.x = Math.sin(time * 0.5) * 0.2 + mouse.y * 0.2;
      ringC.rotation.z = time * 0.45 + mouse.x * 0.4;
      ringC.rotation.x = time * 0.2 + mouse.y * 0.25;
      
      // --- lights pulse with cursor ---
      corePulse.intensity = 0.9 + Math.sin(time * 3.2) * 0.45 + Math.abs(mouse.x) * 0.35;
      rimLight.intensity = 0.75 + Math.sin(time * 2.3) * 0.25 + Math.abs(mouse.y) * 0.3;
      fillLight.intensity = 0.6 + Math.sin(time * 1.9) * 0.2 + Math.abs(mouse.x) * 0.2;
      
      // bloom reacts to cursor
      bloomPass.strength = 0.75 + Math.sin(time * 1.2) * 0.05 + Math.abs(mouse.x) * 0.08;
      
      stars.rotation.y += 0.0003;
      
      if (brainModel) {
        brainModel.rotation.y = Math.sin(time * 0.15) * 0.05;
        brainModel.rotation.x = Math.sin(time * 0.12) * 0.03 + mouse.y * 0.05;
      }
      
      controls.update();
      effectComposer.render();
    }
    
    setTimeout(() => {
      if (!neuronPoints) {
        generateNeurons();
        generateActiveNeurons();
        generateSynapticLines();
      }
      animate();
    }, 300);
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      effectComposer.setSize(window.innerWidth, window.innerHeight);
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('✨ Attractive geometric particles + scaled brain — no bubbles');
  </script>
</body>
</html>
